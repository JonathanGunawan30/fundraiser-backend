services:
  app:
    image: ${DOCKER_IMAGE}
    container_name: fundraiser-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - fundraiser-network
    depends_on:
      - rabbitmq

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: fundraiser-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    networks:
      - fundraiser-network

  queue-worker:
    image: ${DOCKER_IMAGE}
    container_name: fundraiser-queue-worker
    restart: unless-stopped
    env_file:
      - .env
    entrypoint: ["php", "artisan", "queue:work", "--tries=3"]
    networks:
      - fundraiser-network
    depends_on:
      - rabbitmq

networks:
  fundraiser-network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
